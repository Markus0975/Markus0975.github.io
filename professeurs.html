<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Blue World — Professeurs</title>

  <style>
    :root {
      --ink: #10213a;
      --ink-soft: #38516d;
      --gold: #c89d3d;
      --gold-light: #f0d682;
      --paper: rgba(249, 246, 237, 0.94);
    }

    * {
      box-sizing: border-box;
    }

    html {
      min-height: 100%;
    }

    body {
      min-height: 100%;
      margin: 0;
      color: var(--ink);
      font-family: Georgia, "Times New Roman", serif;
      background:
        linear-gradient(rgba(249, 246, 237, 0.91), rgba(249, 246, 237, 0.91)),
        url("map.jpg") center / cover fixed no-repeat;
    }

    .page {
      width: min(1450px, 100%);
      margin: 0 auto;
      padding: clamp(20px, 3vw, 42px);
    }

    h1 {
      margin: 0 0 10px;
      color: var(--ink);
      font-size: clamp(2.1rem, 4vw, 3.2rem);
      letter-spacing: 0.05em;
      text-align: center;
      text-transform: uppercase;
    }

    .intro {
      max-width: 760px;
      margin: 0 auto 34px;
      color: var(--ink-soft);
      font-size: 1.05rem;
      line-height: 1.5;
      text-align: center;
    }

    .section {
      margin-top: 38px;
    }

    .section:first-of-type {
      margin-top: 0;
    }

    h2 {
      display: flex;
      align-items: center;
      gap: 14px;
      margin: 0 0 18px;
      color: var(--ink);
      font-size: clamp(1.45rem, 2.5vw, 2rem);
      letter-spacing: 0.035em;
      text-transform: uppercase;
    }

    h2::after {
      flex: 1;
      height: 1px;
      content: "";
      background: linear-gradient(
        90deg,
        rgba(200, 157, 61, 0.9),
        rgba(200, 157, 61, 0)
      );
    }

    .teachers-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
      gap: clamp(14px, 2vw, 24px);
    }

    .teacher-card {
      display: block;
      min-width: 0;
      padding: 0;
      overflow: hidden;
      color: inherit;
      text-align: left;
      background: rgba(255, 255, 255, 0.98);
      border: 1px solid rgba(16, 33, 58, 0.2);
      border-radius: 12px;
      box-shadow: 0 6px 18px rgba(10, 23, 45, 0.16);
      cursor: pointer;
      transition:
        transform 0.2s ease,
        box-shadow 0.2s ease,
        border-color 0.2s ease;
    }

    .teacher-card:hover,
    .teacher-card:focus-visible {
      border-color: var(--gold);
      box-shadow: 0 11px 28px rgba(10, 23, 45, 0.28);
      outline: none;
      transform: translateY(-4px);
    }

    .teacher-card img {
      display: block;
      width: 100%;
      aspect-ratio: 4 / 5;
      object-fit: cover;
      background: #d9e0e9;
      transition: transform 0.3s ease;
    }

    .teacher-card:hover img,
    .teacher-card:focus-visible img {
      transform: scale(1.035);
    }

    .teacher-info {
      min-height: 95px;
      padding: 14px 15px 15px;
      background: var(--paper);
    }

    .teacher-name {
      display: block;
      margin-bottom: 6px;
      color: var(--ink);
      font-size: 1.1rem;
      font-weight: 700;
      line-height: 1.2;
    }

    .teacher-subject {
      display: block;
      color: var(--ink-soft);
      font-size: 0.94rem;
      line-height: 1.3;
    }

    .lightbox {
      position: fixed;
      z-index: 9999;
      inset: 0;
      display: none;
      align-items: center;
      justify-content: center;
      padding: clamp(16px, 4vw, 52px);
      background: rgba(3, 8, 16, 0.95);
    }

    .lightbox.open {
      display: flex;
    }

    .lightbox-figure {
      display: flex;
      flex-direction: column;
      align-items: center;
      width: min(1300px, 100%);
      max-height: 100%;
      margin: 0;
    }

    .lightbox-image {
      display: block;
      max-width: 100%;
      max-height: calc(100vh - 125px);
      object-fit: contain;
      border: 1px solid rgba(240, 214, 130, 0.72);
      box-shadow: 0 12px 45px rgba(0, 0, 0, 0.68);
    }

    .lightbox-caption {
      margin-top: 13px;
      color: #fff6d2;
      font-size: clamp(1rem, 2vw, 1.3rem);
      font-weight: 700;
      text-align: center;
    }

    .lightbox-close,
    .lightbox-arrow {
      position: fixed;
      z-index: 2;
      color: #fff9e7;
      font-family: Arial, Helvetica, sans-serif;
      line-height: 1;
      background: rgba(17, 31, 51, 0.78);
      border: 1px solid rgba(240, 214, 130, 0.58);
      cursor: pointer;
    }

    .lightbox-close {
      top: 18px;
      right: 20px;
      width: 44px;
      height: 44px;
      border-radius: 50%;
      font-size: 2rem;
    }

    .lightbox-arrow {
      top: 50%;
      width: 48px;
      height: 62px;
      border-radius: 8px;
      font-size: 2.8rem;
      transform: translateY(-50%);
    }

    .lightbox-prev {
      left: 18px;
    }

    .lightbox-next {
      right: 18px;
    }

    .lightbox-close:hover,
    .lightbox-close:focus-visible,
    .lightbox-arrow:hover,
    .lightbox-arrow:focus-visible {
      color: #1a1406;
      background: var(--gold-light);
      outline: none;
    }

    @media (max-width: 600px) {
      .page {
        padding: 18px 12px 28px;
      }

      .teachers-grid {
        grid-template-columns: repeat(2, minmax(0, 1fr));
        gap: 10px;
      }

      .teacher-info {
        min-height: 88px;
        padding: 10px;
      }

      .teacher-name {
        font-size: 0.95rem;
      }

      .teacher-subject {
        font-size: 0.8rem;
      }

      .lightbox-arrow {
        width: 39px;
        height: 52px;
        font-size: 2.2rem;
      }

      .lightbox-prev {
        left: 8px;
      }

      .lightbox-next {
        right: 8px;
      }
    }
  </style>
</head>

<body>
  <main class="page">
    <h1>Professeurs</h1>

    <p class="intro">
      Les enseignants qui accompagnent les élèves de Blue World,
      de l’école primaire à l’Académie.
    </p>

    <section class="section">
      <h2>École primaire</h2>

      <div class="teachers-grid">
        <button
          class="teacher-card"
          type="button"
          data-image="valet.png"
          data-title="Tamsin Vale — Professeure de Terre"
        >
          <img src="valet.png" alt="Tamsin Vale" loading="lazy">
          <span class="teacher-info">
            <span class="teacher-name">Tamsin Vale</span>
            <span class="teacher-subject">Professeure de Terre</span>
          </span>
        </button>

        <button
          class="teacher-card"
          type="button"
          data-image="oukikazem.png"
          data-title="Mila Oukikaze — Professeure d’Air"
        >
          <img src="oukikazem.png" alt="Mila Oukikaze" loading="lazy">
          <span class="teacher-info">
            <span class="teacher-name">Mila Oukikaze</span>
            <span class="teacher-subject">Professeure d’Air</span>
          </span>
        </button>

        <button
          class="teacher-card"
          type="button"
          data-image="pastorej.png"
          data-title="Jean Pastore — Professeur de Lumière"
        >
          <img src="pastorej.png" alt="Jean Pastore" loading="lazy">
          <span class="teacher-info">
            <span class="teacher-name">Jean Pastore</span>
            <span class="teacher-subject">Professeur de Lumière</span>
          </span>
        </button>

        <button
          class="teacher-card"
          type="button"
          data-image="morisatok.png"
          data-title="Kenatsui Morisato — Professeur d’Épée"
        >
          <img src="morisatok.png" alt="Kenatsui Morisato" loading="lazy">
          <span class="teacher-info">
            <span class="teacher-name">Kenatsui Morisato</span>
            <span class="teacher-subject">Professeur d’Épée</span>
          </span>
        </button>

        <button
          class="teacher-card"
          type="button"
          data-image="barbosar.png"
          data-title="Raul Barbosa — Professeur de Feu"
        >
          <img src="barbosar.png" alt="Raul Barbosa" loading="lazy">
          <span class="teacher-info">
            <span class="teacher-name">Raul Barbosa</span>
            <span class="teacher-subject">Professeur de Feu</span>
          </span>
        </button>

        <button
          class="teacher-card"
          type="button"
          data-image="kaltd.png"
          data-title="Darius Kalt — Professeur de Glace"
        >
          <img src="kaltd.png" alt="Darius Kalt" loading="lazy">
          <span class="teacher-info">
            <span class="teacher-name">Darius Kalt</span>
            <span class="teacher-subject">Professeur de Glace</span>
          </span>
        </button>
      </div>
    </section>

    <section class="section">
      <h2>Académie</h2>

      <div class="teachers-grid">
        <button
          class="teacher-card"
          type="button"
          data-image="aldrico.png"
          data-title="Ole Aldric — Professeur de Glace et d’Histoire"
        >
          <img src="aldrico.png" alt="Ole Aldric" loading="lazy">
          <span class="teacher-info">
            <span class="teacher-name">Ole Aldric</span>
            <span class="teacher-subject">Glace et Histoire</span>
          </span>
        </button>

        <button
          class="teacher-card"
          type="button"
          data-image="elendryst.png"
          data-title="Tyron Elendrys — Professeur de Lumière"
        >
          <img src="elendryst.png" alt="Tyron Elendrys" loading="lazy">
          <span class="teacher-info">
            <span class="teacher-name">Tyron Elendrys</span>
            <span class="teacher-subject">Professeur de Lumière</span>
          </span>
        </button>

        <button
          class="teacher-card"
          type="button"
          data-image="candelac.png"
          data-title="Carmen Candela — Professeure de Feu et de Lumière"
        >
          <img src="candelac.png" alt="Carmen Candela" loading="lazy">
          <span class="teacher-info">
            <span class="teacher-name">Carmen Candela</span>
            <span class="teacher-subject">Feu et Lumière</span>
          </span>
        </button>

        <button
          class="teacher-card"
          type="button"
          data-image="vascor.png"
          data-title="Ramon Vasco — Professeur de Feu"
        >
          <img src="vascor.png" alt="Ramon Vasco" loading="lazy">
          <span class="teacher-info">
            <span class="teacher-name">Ramon Vasco</span>
            <span class="teacher-subject">Professeur de Feu</span>
          </span>
        </button>

        <button
          class="teacher-card"
          type="button"
          data-image="kirang.png"
          data-title="Geraint Kiran — Professeur de Terre"
        >
          <img src="kirang.png" alt="Geraint Kiran" loading="lazy">
          <span class="teacher-info">
            <span class="teacher-name">Geraint Kiran</span>
            <span class="teacher-subject">Professeur de Terre</span>
          </span>
        </button>
      </div>
    </section>
  </main>

  <div class="lightbox" id="lightbox" aria-hidden="true">
    <button class="lightbox-close" type="button" aria-label="Fermer">×</button>
    <button class="lightbox-arrow lightbox-prev" type="button" aria-label="Image précédente">‹</button>

    <figure class="lightbox-figure">
      <img class="lightbox-image" id="lightbox-image" src="" alt="">
      <figcaption class="lightbox-caption" id="lightbox-caption"></figcaption>
    </figure>

    <button class="lightbox-arrow lightbox-next" type="button" aria-label="Image suivante">›</button>
  </div>

  <script>
    const cards = [...document.querySelectorAll(".teacher-card")];
    const lightbox = document.getElementById("lightbox");
    const lightboxImage = document.getElementById("lightbox-image");
    const lightboxCaption = document.getElementById("lightbox-caption");
    const closeButton = document.querySelector(".lightbox-close");
    const previousButton = document.querySelector(".lightbox-prev");
    const nextButton = document.querySelector(".lightbox-next");

    let currentIndex = 0;

    function showTeacher(index) {
      currentIndex = (index + cards.length) % cards.length;

      const card = cards[currentIndex];
      const title = card.dataset.title;

      lightboxImage.src = card.dataset.image;
      lightboxImage.alt = title;
      lightboxCaption.textContent = title;
    }

    function openLightbox(index) {
      showTeacher(index);
      lightbox.classList.add("open");
      lightbox.setAttribute("aria-hidden", "false");
      document.body.style.overflow = "hidden";
      closeButton.focus();
    }

    function closeLightbox() {
      lightbox.classList.remove("open");
      lightbox.setAttribute("aria-hidden", "true");
      document.body.style.overflow = "";
      cards[currentIndex].focus();
    }

    cards.forEach((card, index) => {
      card.addEventListener("click", () => openLightbox(index));
    });

    closeButton.addEventListener("click", closeLightbox);

    previousButton.addEventListener("click", () => {
      showTeacher(currentIndex - 1);
    });

    nextButton.addEventListener("click", () => {
      showTeacher(currentIndex + 1);
    });

    lightbox.addEventListener("click", (event) => {
      if (event.target === lightbox) {
        closeLightbox();
      }
    });

    document.addEventListener("keydown", (event) => {
      if (!lightbox.classList.contains("open")) return;

      if (event.key === "Escape") closeLightbox();
      if (event.key === "ArrowLeft") showTeacher(currentIndex - 1);
      if (event.key === "ArrowRight") showTeacher(currentIndex + 1);
    });
  </script>
</body>
</html>
