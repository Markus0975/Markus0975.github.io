<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Blue World — Lieux</title>

  <style>
    :root {
      --ink: #10213a;
      --gold: #c89d3d;
      --paper: rgba(249, 246, 237, 0.94);
    }

    * {
      box-sizing: border-box;
    }

    html {
      min-height: 100%;
      background: transparent;
    }

    body {
      min-height: 100%;
      margin: 0;
      color: var(--ink);
      font-family: Georgia, "Times New Roman", serif;
      background:
        linear-gradient(rgba(249, 246, 237, 0.90), rgba(249, 246, 237, 0.90)),
        url("https://raw.githubusercontent.com/Markus0975/img/main/map.jpg") center / cover fixed no-repeat;
    }

    .page {
      width: min(1500px, 100%);
      margin: 0 auto;
      padding: clamp(18px, 3vw, 42px);
    }

    .continent-section {
      margin-bottom: clamp(30px, 4vw, 46px);
    }

    .continent-section:last-child {
      margin-bottom: 0;
    }

    .continent-section h2 {
      display: flex;
      align-items: center;
      gap: 14px;
      margin: 0 0 16px;
      color: var(--ink);
      font-size: clamp(1.45rem, 2.6vw, 2rem);
      letter-spacing: 0.04em;
      text-transform: uppercase;
    }

    .continent-section h2::after {
      flex: 1;
      height: 1px;
      content: "";
      background: linear-gradient(
        90deg,
        rgba(200, 157, 61, 0.9),
        rgba(200, 157, 61, 0)
      );
    }

    .palace-grid {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: clamp(14px, 2vw, 24px);
    }

    .palace-card {
      display: block;
      min-width: 0;
      padding: 0;
      overflow: hidden;
      text-align: left;
      background: #fff;
      border: 1px solid rgba(16, 33, 58, 0.22);
      border-radius: 12px;
      box-shadow: 0 6px 18px rgba(10, 23, 45, 0.16);
      cursor: pointer;
      transition:
        transform 0.2s ease,
        box-shadow 0.2s ease,
        border-color 0.2s ease;
    }

    .palace-card:hover,
    .palace-card:focus-visible {
      border-color: var(--gold);
      box-shadow: 0 11px 28px rgba(10, 23, 45, 0.28);
      outline: none;
      transform: translateY(-4px);
    }

    .palace-card img {
      display: block;
      width: 100%;
      aspect-ratio: 4 / 3;
      object-fit: cover;
      background: #d5dce5;
      transition: transform 0.3s ease;
    }

    .palace-card:hover img,
    .palace-card:focus-visible img {
      transform: scale(1.035);
    }

    .card-label {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
      min-height: 52px;
      padding: 11px 14px;
      color: var(--ink);
      font-size: 1.03rem;
      font-weight: 700;
      letter-spacing: 0.015em;
      background: var(--paper);
    }

    .zoom-icon {
      flex: 0 0 auto;
      color: #8b681e;
      font-family: Arial, sans-serif;
      font-size: 1.2rem;
      font-weight: 400;
    }

    .lightbox {
      position: fixed;
      z-index: 9999;
      inset: 0;
      display: none;
      align-items: center;
      justify-content: center;
      padding: clamp(16px, 4vw, 50px);
      background: rgba(3, 8, 16, 0.95);
    }

    .lightbox.open {
      display: flex;
    }

    .lightbox-figure {
      display: flex;
      flex-direction: column;
      align-items: center;
      width: min(1600px, 100%);
      max-height: 100%;
      margin: 0;
    }

    .lightbox img {
      display: block;
      max-width: 100%;
      max-height: calc(100vh - 112px);
      object-fit: contain;
      border: 1px solid rgba(242, 216, 139, 0.7);
      box-shadow: 0 12px 45px rgba(0, 0, 0, 0.65);
    }

    .lightbox figcaption {
      max-width: 100%;
      margin-top: 13px;
      color: #fff6d2;
      font-size: clamp(1rem, 2vw, 1.32rem);
      font-weight: 700;
      text-align: center;
    }

    .lightbox-close,
    .lightbox-arrow {
      position: fixed;
      z-index: 1;
      color: #fff9e7;
      font-family: Arial, sans-serif;
      line-height: 1;
      background: rgba(17, 31, 51, 0.75);
      border: 1px solid rgba(242, 216, 139, 0.55);
      cursor: pointer;
    }

    .lightbox-close {
      top: 18px;
      right: 20px;
      width: 44px;
      height: 44px;
      border-radius: 50%;
      font-size: 2rem;
    }

    .lightbox-arrow {
      top: 50%;
      width: 48px;
      height: 62px;
      border-radius: 8px;
      font-size: 2.8rem;
      transform: translateY(-50%);
    }

    .lightbox-prev {
      left: 18px;
    }

    .lightbox-next {
      right: 18px;
    }

    .lightbox-close:hover,
    .lightbox-close:focus-visible,
    .lightbox-arrow:hover,
    .lightbox-arrow:focus-visible {
      color: #1a1406;
      background: #f2d88b;
      outline: none;
    }

    @media (max-width: 850px) {
      .palace-grid {
        grid-template-columns: repeat(2, minmax(0, 1fr));
      }
    }

    @media (max-width: 600px) {
      .page {
        padding: 18px 12px 30px;
      }

      .palace-grid {
        grid-template-columns: repeat(2, minmax(0, 1fr));
        gap: 10px;
      }

      .card-label {
        min-height: 48px;
        padding: 9px 10px;
        font-size: 0.85rem;
      }

      .zoom-icon {
        display: none;
      }

      .lightbox-arrow {
        width: 39px;
        height: 52px;
        font-size: 2.2rem;
      }

      .lightbox-prev {
        left: 8px;
      }

      .lightbox-next {
        right: 8px;
      }
    }
  </style>
</head>

<body>
  <main class="page">

    <section class="continent-section">
      <h2>Nord</h2>

      <div class="palace-grid">

        <button class="palace-card" type="button"
          data-image="https://raw.githubusercontent.com/Markus0975/img/main/palaissoren.png"
          data-title="Palais Skarsen"
          aria-label="Ouvrir Palais Skarsen">
          <img src="https://raw.githubusercontent.com/Markus0975/img/main/palaissoren.png" alt="Palais Skarsen" loading="lazy">
          <span class="card-label">
            Palais Skarsen
            <span class="zoom-icon" aria-hidden="true">⤢</span>
          </span>
        </button>

        <button class="palace-card" type="button"
          data-image="https://raw.githubusercontent.com/Markus0975/img/main/palaisolga.png"
          data-title="Palais Halvorsen"
          aria-label="Ouvrir Palais Halvorsen">
          <img src="https://raw.githubusercontent.com/Markus0975/img/main/palaisolga.png" alt="Palais Halvorsen" loading="lazy">
          <span class="card-label">
            Palais Halvorsen
            <span class="zoom-icon" aria-hidden="true">⤢</span>
          </span>
        </button>

        <button class="palace-card" type="button"
          data-image="https://raw.githubusercontent.com/Markus0975/img/main/palaisnord.png"
          data-title="Palais du Nord"
          aria-label="Ouvrir Palais du Nord">
          <img src="https://raw.githubusercontent.com/Markus0975/img/main/palaisnord.png" alt="Palais du Nord" loading="lazy">
          <span class="card-label">
            Palais du Nord
            <span class="zoom-icon" aria-hidden="true">⤢</span>
          </span>
        </button>

      </div>
    </section>

    <section class="continent-section">
      <h2>Ouest</h2>

      <div class="palace-grid">

        <button class="palace-card" type="button"
          data-image="https://raw.githubusercontent.com/Markus0975/img/main/palaisedric.png"
          data-title="Palais Ouest Nord"
          aria-label="Ouvrir Palais Ouest Nord">
          <img src="https://raw.githubusercontent.com/Markus0975/img/main/palaisedric.png" alt="Palais Ouest Nord" loading="lazy">
          <span class="card-label">
            Palais Ouest Nord
            <span class="zoom-icon" aria-hidden="true">⤢</span>
          </span>
        </button>

        <button class="palace-card" type="button"
          data-image="https://raw.githubusercontent.com/Markus0975/img/main/palaisarthur.png"
          data-title="Palais Ouest Centre"
          aria-label="Ouvrir Palais Ouest Centre">
          <img src="https://raw.githubusercontent.com/Markus0975/img/main/palaisarthur.png" alt="Palais Ouest Centre" loading="lazy">
          <span class="card-label">
            Palais Ouest Centre
            <span class="zoom-icon" aria-hidden="true">⤢</span>
          </span>
        </button>

        <button class="palace-card" type="button"
          data-image="https://raw.githubusercontent.com/Markus0975/img/main/palaiselisa.png"
          data-title="Palais Ouest Sud"
          aria-label="Ouvrir Palais Ouest Sud">
          <img src="https://raw.githubusercontent.com/Markus0975/img/main/palaiselisa.png" alt="Palais Ouest Sud" loading="lazy">
          <span class="card-label">
            Palais Ouest Sud
            <span class="zoom-icon" aria-hidden="true">⤢</span>
          </span>
        </button>

      </div>
    </section>

    <section class="continent-section">
      <h2>Sud</h2>

      <div class="palace-grid">

        <button class="palace-card" type="button"
          data-image="https://raw.githubusercontent.com/Markus0975/img/main/palaiszahra.png"
          data-title="Palais Cherifa"
          aria-label="Ouvrir Palais Cherifa">
          <img src="https://raw.githubusercontent.com/Markus0975/img/main/palaiszahra.png" alt="Palais Cherifa" loading="lazy">
          <span class="card-label">
            Palais Cherifa
            <span class="zoom-icon" aria-hidden="true">⤢</span>
          </span>
        </button>

        <button class="palace-card" type="button"
          data-image="https://raw.githubusercontent.com/Markus0975/img/main/palaisdiego.png"
          data-title="Palais Sud-Est"
          aria-label="Ouvrir Palais Sud-Est">
          <img src="https://raw.githubusercontent.com/Markus0975/img/main/palaisdiego.png" alt="Palais Sud-Est" loading="lazy">
          <span class="card-label">
            Palais Sud-Est
            <span class="zoom-icon" aria-hidden="true">⤢</span>
          </span>
        </button>

      </div>
    </section>

    <section class="continent-section">
      <h2>Est</h2>

      <div class="palace-grid">

        <button class="palace-card" type="button"
          data-image="https://raw.githubusercontent.com/Markus0975/img/main/palaisest.png"
          data-title="Palais Est"
          aria-label="Ouvrir Palais Est">
          <img src="https://raw.githubusercontent.com/Markus0975/img/main/palaisest.png" alt="Palais Est" loading="lazy">
          <span class="card-label">
            Palais Est
            <span class="zoom-icon" aria-hidden="true">⤢</span>
          </span>
        </button>

        <button class="palace-card" type="button"
          data-image="https://raw.githubusercontent.com/Markus0975/img/main/palaiselfe.png"
          data-title="Palais Elfe"
          aria-label="Ouvrir Palais Elfe">
          <img src="https://raw.githubusercontent.com/Markus0975/img/main/palaiselfe.png" alt="Palais Elfe" loading="lazy">
          <span class="card-label">
            Palais Elfe
            <span class="zoom-icon" aria-hidden="true">⤢</span>
          </span>
        </button>

      </div>
    </section>
    

    <section class="continent-section">
      <h2>Centrale</h2>

      <div class="palace-grid">

        <button class="palace-card" type="button"
          data-image="https://raw.githubusercontent.com/Markus0975/img/main/academie.png"
          data-title="Académie Centrale"
          aria-label="Ouvrir Academie Centrale">
          <img src="https://raw.githubusercontent.com/Markus0975/img/main/academie.png" alt="Academie Centrale" loading="lazy">
          <span class="card-label">
            Academie Centrale
            <span class="zoom-icon" aria-hidden="true">⤢</span>
          </span>
        </button>
        
      </div>
    </section>
  

  </main>

  <div class="lightbox" id="lightbox" aria-hidden="true">
    <button class="lightbox-close" type="button" aria-label="Fermer l’image">×</button>
    <button class="lightbox-arrow lightbox-prev" type="button" aria-label="Image précédente">‹</button>

    <figure class="lightbox-figure">
      <img id="lightbox-image" src="" alt="">
      <figcaption id="lightbox-title"></figcaption>
    </figure>

    <button class="lightbox-arrow lightbox-next" type="button" aria-label="Image suivante">›</button>
  </div>

  <script>
    const cards = [...document.querySelectorAll(".palace-card")];
    const lightbox = document.getElementById("lightbox");
    const lightboxImage = document.getElementById("lightbox-image");
    const lightboxTitle = document.getElementById("lightbox-title");
    const closeButton = document.querySelector(".lightbox-close");
    const previousButton = document.querySelector(".lightbox-prev");
    const nextButton = document.querySelector(".lightbox-next");

    let currentIndex = 0;

    function showImage(index) {
      currentIndex = (index + cards.length) % cards.length;

      const card = cards[currentIndex];
      const title = card.dataset.title;

      lightboxImage.src = card.dataset.image;
      lightboxImage.alt = title;
      lightboxTitle.textContent = title;
    }

    function openLightbox(index) {
      showImage(index);
      lightbox.classList.add("open");
      lightbox.setAttribute("aria-hidden", "false");
      document.body.style.overflow = "hidden";
      closeButton.focus();
    }

    function closeLightbox() {
      lightbox.classList.remove("open");
      lightbox.setAttribute("aria-hidden", "true");
      document.body.style.overflow = "";
      cards[currentIndex].focus();
    }

    cards.forEach((card, index) => {
      card.addEventListener("click", () => openLightbox(index));
    });

    closeButton.addEventListener("click", closeLightbox);

    previousButton.addEventListener("click", () => {
      showImage(currentIndex - 1);
    });

    nextButton.addEventListener("click", () => {
      showImage(currentIndex + 1);
    });

    lightbox.addEventListener("click", (event) => {
      if (event.target === lightbox) {
        closeLightbox();
      }
    });

    document.addEventListener("keydown", (event) => {
      if (!lightbox.classList.contains("open")) return;

      if (event.key === "Escape") closeLightbox();
      if (event.key === "ArrowLeft") showImage(currentIndex - 1);
      if (event.key === "ArrowRight") showImage(currentIndex + 1);
    });
  </script>
</body>
</html>
