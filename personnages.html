*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    font-family:Arial,Helvetica,sans-serif;
    color:#f5f7fb;
    background:
        linear-gradient(rgba(5,10,20,.78),rgba(5,10,20,.94)),
        url("https://raw.githubusercontent.com/Markus0975/img/main/map.jpg");
    background-size:cover;
    background-position:center;
    background-attachment:fixed;
}

header{
    padding:70px 20px 35px;
    text-align:center;
}

h1{
    font-size:clamp(2.6rem,6vw,4rem);
    letter-spacing:3px;
    text-transform:uppercase;
}

.subtitle{
    margin-top:12px;
    color:#d8e6ff;
}

nav{
    display:flex;
    justify-content:center;
    flex-wrap:wrap;
    gap:12px;
    padding:18px;
    background:rgba(0,0,0,.35);
    backdrop-filter:blur(8px);
}

nav a{
    color:white;
    text-decoration:none;
    padding:10px 16px;
    border-radius:999px;
    background:rgba(255,255,255,.12);
}

nav a:hover{
    background:#2f9cff;
}

main{
    max-width:900px;
    margin:50px auto;
    padding:0 20px;
}

.list{
    background:rgba(14,22,38,.88);
    border-radius:22px;
    overflow:hidden;
    border:1px solid rgba(255,255,255,.10);
}

.item{
    display:flex;
    justify-content:space-between;
    align-items:center;
    text-decoration:none;
    color:white;
    padding:24px 28px;
    font-size:1.2rem;
    border-bottom:1px solid rgba(255,255,255,.08);
    transition:.2s;
}

.item:last-child{
    border-bottom:none;
}

.item:hover{
    background:rgba(255,255,255,.08);
}

.arrow{
    color:#7fd6ff;
    font-size:1.4rem;
}
