<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Blue World — Encyclopédie</title>
  <style>
    :root {
      --menu-width: clamp(205px, 15vw, 270px);
      --gold: #e9c76b;
      --panel: rgba(8, 18, 35, 0.84);
      --panel-soft: rgba(12, 27, 49, 0.72);
      --line: rgba(233, 199, 107, 0.42);
      --text: #f6f3e9;
    }

    * {
      box-sizing: border-box;
    }

    html,
    body {
      width: 100%;
      min-height: 100%;
      margin: 0;
    }

    body {
      overflow: hidden;
      color: var(--text);
      font-family: Georgia, "Times New Roman", serif;
      background:
        linear-gradient(rgba(4, 12, 24, 0.56), rgba(4, 12, 24, 0.56)),
        url("map.jpg") center center / cover fixed no-repeat;
    }

    .site-shell {
      display: grid;
      grid-template-columns: var(--menu-width) minmax(0, 1fr);
      width: 100vw;
      height: 100vh;
      min-height: 100dvh;
    }

    aside {
      position: relative;
      z-index: 2;
      display: flex;
      flex-direction: column;
      min-width: 0;
      padding: 24px 15px 20px;
      background: linear-gradient(180deg, rgba(5, 15, 30, 0.94), rgba(8, 23, 43, 0.88));
      border-right: 1px solid var(--line);
      box-shadow: 5px 0 25px rgba(0, 0, 0, 0.28);
    }

    .brand {
      margin: 0 0 28px;
      padding: 0 6px 20px;
      text-align: center;
      border-bottom: 1px solid var(--line);
    }

    .brand h1 {
      margin: 0;
      color: var(--gold);
      font-size: clamp(1.45rem, 1.8vw, 2rem);
      font-weight: 700;
      letter-spacing: 0.06em;
      line-height: 1.05;
      text-transform: uppercase;
      text-shadow: 0 2px 9px rgba(0, 0, 0, 0.7);
    }

    .brand p {
      margin: 8px 0 0;
      color: rgba(246, 243, 233, 0.82);
      font-size: 0.82rem;
      letter-spacing: 0.12em;
      text-transform: uppercase;
    }

    nav {
      display: grid;
      gap: 10px;
    }

    .nav-link {
      display: block;
      width: 100%;
      padding: 14px 13px;
      color: var(--text);
      font: inherit;
      font-size: 1rem;
      font-weight: 700;
      letter-spacing: 0.025em;
      text-align: left;
      text-decoration: none;
      background: rgba(255, 255, 255, 0.055);
      border: 1px solid rgba(233, 199, 107, 0.22);
      border-radius: 8px;
      cursor: pointer;
      transition: background 0.18s ease, border-color 0.18s ease, transform 0.18s ease, color 0.18s ease;
    }

    .nav-link:hover,
    .nav-link:focus-visible {
      color: #fff8d8;
      background: rgba(233, 199, 107, 0.16);
      border-color: var(--gold);
      outline: none;
      transform: translateX(3px);
    }

    .nav-link.active {
      color: #17120a;
      background: linear-gradient(135deg, #f3d984, #c99a35);
      border-color: #ffe7a0;
      box-shadow: 0 3px 14px rgba(0, 0, 0, 0.34);
    }

    .footer {
      margin-top: auto;
      padding-top: 18px;
      color: rgba(246, 243, 233, 0.55);
      font-size: 0.75rem;
      line-height: 1.45;
      text-align: center;
      border-top: 1px solid rgba(233, 199, 107, 0.18);
    }

    main {
      min-width: 0;
      min-height: 0;
      padding: 16px;
    }

    .content-frame {
      display: block;
      width: 100%;
      height: 100%;
      background: rgba(255, 255, 255, 0.86);
      border: 1px solid rgba(233, 199, 107, 0.56);
      border-radius: 12px;
      box-shadow: 0 8px 32px rgba(0, 0, 0, 0.38);
    }

    @media (max-width: 700px) {
      body {
        overflow: auto;
      }

      .site-shell {
        grid-template-columns: 1fr;
        grid-template-rows: auto minmax(70vh, 1fr);
        height: auto;
        min-height: 100dvh;
      }

      aside {
        padding: 16px 14px;
        border-right: 0;
        border-bottom: 1px solid var(--line);
      }

      .brand {
        margin-bottom: 14px;
        padding-bottom: 12px;
      }

      nav {
        grid-template-columns: repeat(2, minmax(0, 1fr));
        gap: 8px;
      }

      .nav-link {
        padding: 11px 10px;
        font-size: 0.9rem;
      }

      .footer {
        display: none;
      }

      main {
        min-height: 74vh;
        padding: 10px;
      }

      .content-frame {
        min-height: 72vh;
        border-radius: 8px;
      }
    }
  </style>
</head>
<body>
  <div class="site-shell">
    <aside>
      <div class="brand">
        <h1>Blue World</h1>
        <p>Encyclopédie</p>
      </div>

      <nav aria-label="Navigation principale">
        <a class="nav-link active" href="personnages.html" target="content-frame">Personnages</a>
        <a class="nav-link" href="eveilles.html" target="content-frame">Éveillés</a>
        <a class="nav-link" href="famille.html" target="content-frame">Famille</a>
        <a class="nav-link" href="amis.html" target="content-frame">Amis</a>
        <a class="nav-link" href="elementaires.html" target="content-frame">Élémentaires</a>
        <a class="nav-link" href="professeurs.html" target="content-frame">Professeurs</a>
        <a class="nav-link" href="lieux.html" target="content-frame">Lieux</a>
      </nav>

      <div class="footer">
        Blue World<br>
        Personnages, familles et territoires
      </div>
    </aside>

    <main>
      <iframe
        class="content-frame"
        name="content-frame"
        title="Contenu Blue World"
        src="personnages.html">
      </iframe>
    </main>
  </div>

  <script>
    const links = document.querySelectorAll(".nav-link");

    links.forEach((link) => {
      link.addEventListener("click", () => {
        links.forEach((item) => item.classList.remove("active"));
        link.classList.add("active");
      });
    });
  </script>
</body>
</html>
